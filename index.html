    <style>
        :root {
            --primary: #1a5f7a;
            --accent: #2c3e50;
            --light-bg: #f4f7f9;
            --card-bg: #ffffff;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #c0392b;
            --info: #3498db;
            --text-dark: #333333;
            --text-gray: #666666;
            --border: #dddddd;
            --shadow: rgba(0, 0, 0, 0.08);
        }
       
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
        }
        
        /* Modern Animations */
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
       
        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
            line-height: 1.5;
            padding: 20px;
            max-width: 850px;
            margin: 0 auto;
        }
       
        /* Header & Logo */
        .header {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            margin-bottom: 30px;
            padding: 20px 0;
            animation: slideInDown 0.6s ease-out;
        }
       
        .logo {
            max-width: 160px;
            min-width: 160px;
            height: auto;
            display: block;
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--shadow);
            flex-shrink: 0;
            animation: fadeInScale 0.8s ease-out;
            transition: transform 0.3s ease;
        }
        
        .logo:hover {
            transform: scale(1.05);
        }
        
        .header > div:not(.logo) {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
       
        .hotel-name {
            font-size: 2rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 2px;
            line-height: 1.2;
            animation: slideInUp 0.6s ease-out 0.1s both;
        }
       
        .report-title {
            color: var(--accent);
            font-size: 1rem;
            font-weight: 600;
            margin-top: 8px;
            letter-spacing: 1px;
            animation: slideInUp 0.6s ease-out 0.2s both;
        }
       
        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 5px 15px var(--shadow);
            padding: 25px;
            margin-bottom: 25px;
            border-left: 5px solid var(--primary);
            animation: slideInUp 0.6s ease-out;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-2px);
        }
       
        .card-title {
            font-size: 1.3rem;
            color: var(--accent);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            display: flex;
            align-items: center;
        }
       
        .card-title i {
            margin-right: 10px;
            color: var(--primary);
        }
       
        /* Form elements */
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-gray);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
       
        input, select, textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
            transition: border-color 0.3s;
            background-color: white;
        }
       
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 2px rgba(26, 95, 122, 0.1);
        }
       
        input[readonly] {
            background-color: #f8f9fa;
            color: var(--text-gray);
            cursor: not-allowed;
        }
        
        #guest-in-house {
            background-color: white;
            border-color: var(--border);
            cursor: text;
        }
        
        #guest-in-house:focus {
            border-color: var(--primary);
            background-color: white;
        }
       
        /* Grid layouts */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
       
        .form-group {
            margin-bottom: 18px;
        }
       
        /* Sales table */
        .sales-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
       
        .sales-table th {
            background-color: #f8f9fa;
            padding: 12px 10px;
            text-align: left;
            font-size: 0.8rem;
            color: var(--text-gray);
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border);
        }
       
        .sales-table td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
        }
       
        .sales-table tr:last-child td {
            border-bottom: none;
        }
       
        .sales-table select, .sales-table input {
            margin: 0;
        }
       
        .remove-btn {
            background-color: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
       
        .remove-btn:hover {
            background-color: #a93226;
        }
       
        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 180px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 5px;
        }
       
        .btn i {
            margin-right: 8px;
        }
       
        .btn-primary {
            background-color: var(--info);
            color: white;
        }
       
        .btn-primary:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
       
        .btn-success {
            background-color: var(--success);
            color: white;
        }
       
        .btn-success:hover {
            background-color: #229954;
            transform: translateY(-2px);
        }
       
        .btn-danger {
            background-color: var(--danger);
            color: white;
        }
       
        .btn-danger:hover {
            background-color: #a93226;
            transform: translateY(-2px);
        }
       
        .btn-small {
            padding: 8px 16px;
            min-width: auto;
            font-size: 0.8rem;
        }
       
        .button-panel {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0 20px;
            gap: 15px;
        }
       
        /* Total sales */
        .total-sales {
            text-align: right;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
        }
       
        .total-amount {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: 5px;
            padding-left: 15px;
            border-left: 5px solid var(--primary);
            display: inline-block;
            padding-right: 10px;
        }
       
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            display: none;
        }
       
        .modal-content {
            background-color: white;
            border-radius: 10px;
            width: 100%;
            max-width: 230mm;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
       
        .modal-close {
            position: fixed;
            top: 30px;
            right: 40px;
            background: var(--danger);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            transition: background-color 0.2s;
        }
       
        .modal-close:hover {
            background-color: #a93226;
        }
       
        .modal-body {
            padding: 30px;
        }
       
        .modal-actions {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 20px 30px;
            border-top: 1px solid var(--border);
            text-align: right;
        }


       
        /* PDF render area (hidden) */
        #pdf-render {
            position: fixed;
            left: -10000px;
            width: 210mm;
            padding: 15mm;
            background: white;
            color: black;
            font-size: 12pt;
            line-height: 1.5;
        }
       
        .pdf-section {
            margin-bottom: 20px;
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            page-break-inside: avoid;
        }
       
        .pdf-section-title {
            font-size: 16pt;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 10px;
        }
       
        .pdf-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
       
        .pdf-grid-item {
            margin-bottom: 8px;
        }
       
        .pdf-label {
            font-weight: bold;
            font-size: 10pt;
            color: var(--text-gray);
            text-transform: uppercase;
        }
       
        .pdf-value {
            font-size: 11pt;
            padding-top: 3px;
        }
       
        .pdf-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
       
        .pdf-table th {
            background-color: #f1f1f1;
            padding: 10px;
            text-align: left;
            font-weight: bold;
            border-bottom: 2px solid var(--border);
        }
       
        .pdf-table td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }
       
        .pdf-total {
            text-align: right;
            font-weight: bold;
            font-size: 12pt;
            margin-top: 20px;
            padding-top: 10px;
            border-top: 2px solid var(--border);
        }
       
        .pdf-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary);
            page-break-after: avoid;
            gap: 20px;
        }

        .pdf-header-left {
            flex: 1;
            text-align: left;
        }

        .pdf-header-right {
            flex: 0 0 auto;
        }
       
        .pdf-logo {
            max-width: 160px;
            width: 160px;
            height: auto;
            display: block;
            border-radius: 4px;
        }
       
        .pdf-hotel-name {
            font-size: 22pt;
            color: var(--primary);
            font-weight: bold;
            margin: 0;
        }
       
        .pdf-report-title {
            font-size: 16pt;
            color: var(--accent);
            margin-top: 5px;
        }

        /* Smart page break management */
        .pdf-page-break {
            page-break-after: always;
            margin: 0;
            padding: 0;
        }

        .pdf-section-container {
            page-break-inside: avoid;
            margin-bottom: 25px;
            background: white;
            padding: 0;
        }
        
        .pdf-section {
            page-break-inside: avoid;
            margin: 0;
        }
       
        /* ── Mobile topbar ── */
        .mobile-topbar {
            display: none;
            background: linear-gradient(135deg, #1a5f7a, #0e3d4f);
            padding: 9px 12px;
            align-items: center;
            justify-content: space-between;
            margin: -20px -20px 14px -20px;
            position: sticky; top: 0; z-index: 50;
        }
        .mtb-left { display: flex; align-items: center; gap: 8px; }
        .mtb-logo-wrap { width: 44px; height: 36px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 2px; }
        .mtb-logo-wrap img { width: 100%; height: 100%; object-fit: contain; border-radius: 2px; }
        .mtb-name { color: white; font-size: 12.5px; font-weight: 700; }
        .mtb-sub { color: rgba(255,255,255,0.65); font-size: 10px; margin-top: 1px; }
        .mtb-switch { background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 10px; font-size: 9.5px; font-weight: 600; display: flex; align-items: center; gap: 3px; cursor: pointer; white-space: nowrap; }

        /* ── Compact card title ── */
        .card-compact-title { display: none; font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 7px; align-items: center; gap: 4px; }
        .card-compact-title i { color: #1a5f7a; font-size: 8px; }
        .occ-field-lbl { display: none; font-size: 8.5px; font-weight: 800; color: #1a5f7a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .occ-desktop-label { display: block; }
        .occ-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
        .occ-grid .occ-field-wrap { display: flex; flex-direction: column; margin-bottom: 18px; }

        /* ── Mobile sales cards ── */
        .sales-card { display: none; }
        .sales-card-entry { background: #f0f7fa; border: 1.5px solid #cce3ec; border-radius: 7px; padding: 6px 8px; margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
        .sce-left { flex: 1; min-width: 0; }
        .sce-right { text-align: right; flex-shrink: 0; }

        .sce-val { font-size: 9px; font-weight: 700; color: #0f2027; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sce-pay { display: inline-block; font-size: 8px; font-weight: 800; color: #64748b; background: #e2e8f0; border-radius: 3px; padding: 1px 5px; margin-top: 2px; }
        .sce-rm { background: #fee2e2; color: #dc2626; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
        .sales-card-total { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; padding-top: 4px; border-top: 1px solid #e2e8f0; }
        .sct-label { font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        .sct-val { font-size: 11px; font-weight: 800; color: #1a5f7a; }
        .sales-card-add-btn { width: 100%; padding: 6px; border: 1.5px dashed #93c5d9; border-radius: 7px; background: none; color: #1a5f7a; font-size: 8.5px; font-weight: 700; display: none; align-items: center; justify-content: center; gap: 4px; margin-top: 3px; cursor: pointer; }

        /* ── Mobile sales card expand/collapse ── */
        .sales-card-entry { background: #f0f7fa; border: 1.5px solid #cce3ec; border-radius: 8px; margin-bottom: 6px; overflow: hidden; cursor: pointer; }
        .sce-open { border-color: #1a5f7a; cursor: default; }
        .sce-collapsed { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; gap: 8px; }
        .sce-col-main { flex: 1; min-width: 0; }
        .sce-col-dept { font-size: 12px; font-weight: 700; color: #0f2027; }
        .sce-col-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
        .sce-col-amt { font-size: 11px; color: #4b6b7a; font-weight: 600; }
        .sce-col-actions { display: none; align-items: center; gap: 6px; flex-shrink: 0; }
        .sce-chevron { font-size: 14px; color: #94a3b8; flex-shrink: 0; margin-left: 6px; }
        .sce-edit-btn { background: #e0f2fe; color: #0369a1; border: none; border-radius: 5px; padding: 4px 10px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .sce-rm { background: #fee2e2; color: #dc2626; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
        .sce-edit { padding: 10px; }
        .sce-edit-row { display: flex; gap: 8px; }
        .sce-edit-group { display: flex; flex-direction: column; }
        .sce-dept-sel { background: white; border: 1.5px solid #cce3ec; border-radius: 6px; padding: 7px 8px; font-size: 12px; font-weight: 600; color: #0f2027; width: 100%; outline: none; }
        .sce-amt-inp { background: white; border: 1.5px solid #1a5f7a; border-radius: 6px; padding: 7px 10px; font-size: 14px; font-weight: 700; color: #0f2027; width: 100%; outline: none; }
        .sce-pills { display: flex; gap: 6px; }

        .sce-done-btn { flex: 1; background: #1a5f7a; color: white; border: none; border-radius: 6px; padding: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .sce-rm-btn { background: #fef2f2; color: #dc2626; border: none; border-radius: 6px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; }

        .dept-mobile-grid { display: none; grid-template-columns: 1fr 1fr; gap: 5px; }

    async function dbSaveReport(snap) {
        try {
            const { error } = await sb.from('reports').upsert({
                id: String(snap.id),
                user_name: (snap.user || currentUser || 'unknown').toLowerCase(),
                report_date: snap.reportDate || null,
                saved_at: snap.savedAt,
                data: snap
            }, { onConflict: 'id' });
            if (error) throw error;
        } catch(e) {
            console.error('Supabase save error:', e);
        }
    }

    async function dbGetAllReports() {
        try {
            const { data, error } = await sb.from('reports').select('data').order('saved_at', { ascending: false });
            if (error) throw error;
            return (data || []).map(r => r.data);
        } catch(e) {
            console.warn('Supabase fetch failed, falling back to localStorage:', e);
            return getLocalAllReports();
        }
    }

    async function dbGetUserReports(user) {

            const { data, error } = await sb.from('reports').select('data').eq('user_name', user.toLowerCase()).order('saved_at', { ascending: false });
            if (error) throw error;
            return (data || []).map(r => r.data);

            console.warn('Supabase fetch failed, using localStorage fallback:', e);

    function getSession() {
        try {
            const s = JSON.parse(localStorage.getItem(SESSION_KEY));
            if (!s) return null;
            // Session valid for 8 hours
            if (Date.now() - s.ts > 8 * 60 * 60 * 1000) { clearSession(); return null; }
            return s;
        } catch(e) { return null; }

    // ── Form snapshot ─────────────────────────────────────────────────
    function getFormSnapshot() {

    }

    function applySnapshot(snap) {
        const savedUser = currentUser; // preserve login
        reportDateInput.value         = snap.reportDate || new Date().toISOString().split('T')[0];

            const r = parseInt(roomsSoldInput.value)||0, c = parseInt(complimentaryRoomsInput.value)||0;
            guestInHouseInput.value = r + c;
        }
        if (snap.deptStatus) {
            ['restaurant','bar','kitchen','laundry','stores','conference'].forEach(k => {
                const el = document.getElementById(k+'-status');
                if (el && snap.deptStatus[k]) el.value = snap.deptStatus[k];
            });
        }
        // Rebuild sales rows
        document.querySelectorAll('.sales-row').forEach((r,i) => { if(i>0) r.remove(); });
        const entries = snap.salesEntries || [];
        const first = document.querySelector('.sales-row');
        if (first && entries.length > 0) {
            first.querySelector('.sales-dept').value    = entries[0].department || 'Reception Morning';
            first.querySelector('.sales-amount').value  = entries[0].amount || '';
            first.querySelector('.sales-payment').value = entries[0].paymentType || 'Cash';

        }
        updateTotalSales();
        currentUser = savedUser; // restore — applySnapshot must never change who's logged in
    }

    // ── Number formatting ─────────────────────────────────────────────
    function formatNumberWithCommas(input) {
        let v = input.value.replace(/[^\d.]/g,'');
        let p = v.split('.');
        if (p.length>2) { v=p[0]+'.'+p[1]; p=v.split('.'); }
        if (v) { let i=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,','); v=p.length===2?i+'.'+p[1].substring(0,2):i; }
        input.value=v; updateTotalSales(); saveToLocalStorage();
    }
    function formatAmountOnBlur(input) {
        let v=input.value.replace(/[^\d.]/g,'');
        if(v){let p=v.split('.');let i=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');input.value=i+'.'+(p[1]||'').substring(0,2).padEnd(2,'0');}
        updateTotalSales(); saveToLocalStorage();
    }

    async function generatePDF(customContent, customFilename) {
        try {
            pdfRender.innerHTML = customContent || generatePreviewContent();
            pdfRender.style.cssText='position:absolute;left:0;top:0;z-index:-1;visibility:visible;';
            await new Promise(r=>setTimeout(r,300));
            const canvas=await html2canvas(pdfRender,{scale:2,useCORS:true,logging:false,backgroundColor:'#ffffff',allowTaint:true});
            const imgWidth=210,pageHeight=297,imgHeight=canvas.height*imgWidth/canvas.width;
            const {jsPDF}=window.jspdf; const pdf=new jsPDF('p','mm','a4');
            let hl=imgHeight,pos=0;
            const imgData=canvas.toDataURL('image/jpeg',0.95);
            pdf.addImage(imgData,'JPEG',0,pos,imgWidth,imgHeight); hl-=pageHeight;
            while(hl>=0){pos=hl-imgHeight;pdf.addPage();pdf.addImage(imgData,'JPEG',0,pos,imgWidth,imgHeight);hl-=pageHeight;}
            pdf.save(customFilename||`Linde_Hotel_Report_${reportDateInput.value||'report'}.pdf`);
        } catch(err){console.error(err);alert('PDF generation failed.');}
        finally{pdfRender.style.cssText='position:fixed;left:-10000px;visibility:hidden;';}
    }

    function formatReportDate(dateStr) {
        if (!dateStr) return '—';
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr;
        const day = d.getDate();
        const month = d.toLocaleDateString('en-GB', { month: 'long' });
        const year = String(d.getFullYear()).slice(-2);
        return `${day}-${month}-${year}`;
    }

    function formatVaultDate(iso){
        const d=new Date(iso);
        return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    }

    function getFilteredReports(allReports){
        const rangeType=document.getElementById('admin-range').value;
        const dateFrom=document.getElementById('admin-date-from').value;
        const dateTo=document.getElementById('admin-date-to').value;
        const userFilter=document.getElementById('admin-user-filter').value;
        const now=new Date();
        let fromDate,toDate=new Date(now.getFullYear(),now.getMonth(),now.getDate(),23,59,59);
        if(rangeType==='custom'){fromDate=dateFrom?new Date(dateFrom):new Date(0);toDate=dateTo?new Date(dateTo+'T23:59:59'):toDate;}
        else if(rangeType==='week'){fromDate=new Date(now);fromDate.setDate(now.getDate()-6);fromDate.setHours(0,0,0,0);}
        else if(rangeType==='month'){fromDate=new Date(now.getFullYear(),now.getMonth(),1);}
        else if(rangeType==='today'){fromDate=new Date(now.getFullYear(),now.getMonth(),now.getDate());}
        else{fromDate=new Date(0);}
        return allReports.filter(r=>{
            const rd=new Date(r.reportDate||r.savedAt);
            if(rd<fromDate||rd>toDate)return false;
            if(userFilter){const ru=(r.user||r.managerName||'').toLowerCase();if(ru!==userFilter)return false;}
            return true;
        });
    }

    let _cachedAllReports=[];
    let _adminDonutChart=null;
    const DEPT_COLORS=['#1a5f7a','#0d9488','#f39c12','#7c3aed','#e67e22','#3b82f6','#10b981'];
    function refreshAdminStats(allReports){
        if(allReports) _cachedAllReports=allReports;
        const reports=getFilteredReports(_cachedAllReports);
        let totalSales=0,totalRooms=0,totalGuests=0,totalComp=0;
        const byDept={},byUser={};
        function deptBaseName(name) {
            return (name||'Other').replace(/\s*(morning|afternoon|evening|night|am|pm)\s*$/i,'').trim() || 'Other';
        }
        reports.forEach(r=>{
            totalRooms+=parseInt(r.roomsSold)||0;
            totalGuests+=parseInt(r.guestInHouse)||0;
            totalComp+=parseInt(r.complimentaryRooms)||0;
            const user=r.managerName||r.user||'Unknown';
            if(!byUser[user])byUser[user]=0;
            (r.salesEntries||[]).forEach(e=>{
                const amt=parseFloat((e.amount||'').replace(/[^\d.]/g,''))||0;
                const dept = deptBaseName(e.department);
                totalSales+=amt; byUser[user]+=amt;
                byDept[dept]=(byDept[dept]||0)+amt;
            });
        });
        document.getElementById('admin-stat-sales').textContent=`MWK ${fmt(totalSales)}`;
        document.getElementById('admin-stat-rooms').textContent=totalRooms;
        document.getElementById('admin-stat-guests').textContent=totalGuests;
        document.getElementById('admin-stat-reports').textContent=reports.length;
        document.getElementById('admin-stat-comp').textContent=totalComp;
        document.getElementById('admin-stat-avg').textContent=reports.length?`MWK ${fmt(totalSales/reports.length)}`:'MWK 0';

        // ── Dept breakdown rows with colored bars ──
        const deptEntries=Object.entries(byDept).sort((a,b)=>b[1]-a[1]);
        const deptEl=document.getElementById('admin-dept-breakdown');
        if(deptEntries.length){
            deptEl.innerHTML=deptEntries.map(([d,v],i)=>{
                const pct=totalSales?Math.round(v/totalSales*100):0;
                const color=DEPT_COLORS[i%DEPT_COLORS.length];

                    ctx.fillStyle='#6b7280';

        const html=`

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:12px;">
                <div style="background:#f8fafc;border-radius:8px;padding:16px 18px;border-left:3px solid #1a5f7a;"><div style="font-size:9pt;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;">Total Revenue</div><div style="font-size:15pt;font-weight:700;color:#1a1a2e;">MWK ${fmt(totalSales)}</div></div>
                <div style="background:#f8fafc;border-radius:8px;padding:16px 18px;border-left:3px solid #1a5f7a;"><div style="font-size:9pt;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;">Total Guests</div><div style="font-size:15pt;font-weight:700;color:#1a1a2e;">${totalGuests}</div></div>
                <div style="background:#f8fafc;border-radius:8px;padding:16px 18px;border-left:3px solid #1a5f7a;"><div style="font-size:9pt;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;">Rooms Sold</div><div style="font-size:15pt;font-weight:700;color:#1a1a2e;">${totalRooms}</div></div>
                <div style="background:#f8fafc;border-radius:8px;padding:16px 18px;border-left:3px solid #1a5f7a;"><div style="font-size:9pt;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;">Reports Filed</div><div style="font-size:15pt;font-weight:700;color:#1a1a2e;">${reports.length}</div></div>
                <div style="background:#f8fafc;border-radius:8px;padding:16px 18px;border-left:3px solid #1a5f7a;"><div style="font-size:9pt;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;">Complimentary</div><div style="font-size:15pt;font-weight:700;color:#1a1a2e;">${totalComp}</div></div>
                <div style="background:#f8fafc;border-radius:8px;padding:16px 18px;border-left:3px solid #1a5f7a;"><div style="font-size:9pt;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;">Avg Revenue / Day</div><div style="font-size:15pt;font-weight:700;color:#1a1a2e;">MWK ${fmt(reports.length?totalSales/reports.length:0)}</div></div>
            </div>
        </div></div>
        <div style="height:20px;"></div>
        <div class="pdf-section-container"><div class="pdf-section">
            <div class="pdf-section-title">Revenue by Department</div>
            <table style="width:100%;border-collapse:collapse;margin-top:12px;font-size:10pt;">
                <thead><tr style="background:#1a5f7a;color:white;">
                    <th style="padding:10px 14px;text-align:left;">Department</th>

                <tfoot><tr style="background:#f0f4f8;font-weight:700;">
                    <td style="padding:10px 14px;">TOTAL</td>
                    <td style="padding:10px 14px;text-align:right;">MWK ${fmt(totalSales)}</td>
                    <td style="padding:10px 14px;text-align:right;">100%</td>
                </tr></tfoot>
            </table>
        </div></div>
        <div style="height:20px;"></div>
        <div class="pdf-section-container"><div class="pdf-section">
            <div class="pdf-section-title">Daily Report Log</div>
            <table style="width:100%;border-collapse:collapse;margin-top:12px;font-size:10pt;">
                <thead><tr style="background:#1a5f7a;color:white;">
                    <th style="padding:9px 14px;text-align:left;">Date</th>
                    <th style="padding:9px 14px;text-align:left;">Manager</th>
                    <th style="padding:9px 14px;text-align:center;">Rooms</th>

                </tr></thead>
                <tbody>${reportRows}</tbody>
            </table>
        </div></div>
        <div style="margin-top:36px;padding-top:16px;border-top:1px solid #ddd;font-size:9pt;color:#888;text-align:center;">
            Generated by Admin · ${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'})} at ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
        </div>`;
        return {html, label};
    }

    const _origApplySnapshot = applySnapshot;

        document.querySelectorAll('.dept-mobile-item select[data-dept]').forEach(sel => {

    // ── Mobile Sales Cards ────────────────────────────────────────────
    let mobileExpandedIdx = -1;

    function renderMobileSalesCards(keepOpen) {
        const cardList = document.getElementById('sales-card-list');
        if (!cardList) return;
        const rows = document.querySelectorAll('.sales-row');
        cardList.innerHTML = '';
        const depts = ['Reception Morning','Reception Afternoon','Restaurant Morning','Restaurant Afternoon','Bar','Laundry'];
        const pays  = ['Cash','Visa','Credit'];

        rows.forEach((row, idx) => {
            const dept = row.querySelector('.sales-dept').value;
            const amt  = row.querySelector('.sales-amount').value || '';
            const pay  = row.querySelector('.sales-payment').value;
            const isOpen = (idx === mobileExpandedIdx);
            const card = document.createElement('div');
            card.className = 'sales-card-entry' + (isOpen ? ' sce-open' : '');
            card.dataset.idx = idx;

            if (isOpen) {
                // ── Expanded: live inputs ──
                card.innerHTML = `
                    <div class="sce-edit">
                        <div class="sce-edit-tap-close" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #cce3ec;cursor:pointer;">
                            <span style="font-size:11px;color:#1a5f7a;font-weight:700;">${dept}</span>
                            <span style="font-size:10px;color:#94a3b8;">tap to close ›</span>
                        </div>
                        <div class="sce-edit-row">
                            <div class="sce-edit-group" style="flex:1;">
                                <div class="sce-lbl">Department</div>
                                <select class="sce-dept-sel">${depts.map(d=>`<option${d===dept?' selected':''}>${d}</option>`).join('')}</select>
                            </div>
                        </div>
                        <div class="sce-edit-row" style="margin-top:7px;">
                            <div class="sce-edit-group" style="flex:1;">
                                <div class="sce-lbl">Amount (MWK)</div>
                                <input class="sce-amt-inp" type="text" inputmode="numeric" placeholder="0" value="${amt}">
                            </div>
                        </div>
                        <div class="sce-edit-row" style="margin-top:7px;">
                            <div class="sce-lbl" style="margin-bottom:4px;">Payment</div>
                            <div class="sce-pills">
                                ${pays.map(p=>`<button class="sce-pill${p===pay?' sce-pill-active':''}" data-pay="${p}">${p}</button>`).join('')}
                            </div>
                        </div>
                        <div style="display:flex;justify-content:space-between;margin-top:8px;gap:6px;">
                            <button class="sce-done-btn">Done</button>
                            <button class="sce-rm-btn"><i class="fas fa-times"></i> Remove</button>
                        </div>
                    </div>`;

                // tap header to collapse (saves current values via closure)
                card.querySelector('.sce-edit-tap-close').addEventListener('click', () => {
                    mobileExpandedIdx = -1; renderMobileSalesCards();
                });
                // dept change
                card.querySelector('.sce-dept-sel').addEventListener('change', function() {
                    row.querySelector('.sales-dept').value = this.value;
                    saveToLocalStorage();
                });
                // amount input — sync on every keystroke AND on blur
                const amtInp = card.querySelector('.sce-amt-inp');
                function syncAmt() {
                    let v = amtInp.value.replace(/[^\d.]/g,'');
                    let p = v.split('.');
                    if (p.length > 2) v = p[0]+'.'+p[1];
                    let i = (p[0]||'').replace(/\B(?=(\d{3})+(?!\d))/g,',');
                    amtInp.value = p.length===2 ? i+'.'+p[1].substring(0,2) : i;
                    row.querySelector('.sales-amount').value = amtInp.value;
                    updateTotalSales(); saveToLocalStorage();
                }
                amtInp.addEventListener('input', syncAmt);
                amtInp.addEventListener('blur', syncAmt);
                // payment pills
                card.querySelectorAll('.sce-pill').forEach(pill => {
                    pill.addEventListener('click', function() {
                        card.querySelectorAll('.sce-pill').forEach(p => p.classList.remove('sce-pill-active'));
                        this.classList.add('sce-pill-active');
                        row.querySelector('.sales-payment').value = this.dataset.pay;
                        saveToLocalStorage();
                    });
                });
                // done
                card.querySelector('.sce-done-btn').addEventListener('click', () => {
                    mobileExpandedIdx = -1; renderMobileSalesCards();
                });
                // remove
                card.querySelector('.sce-rm-btn').addEventListener('click', () => {
                    row.remove(); updateTotalSales(); saveToLocalStorage();
                    mobileExpandedIdx = -1; renderMobileSalesCards();
                });

            } else {
                // ── Collapsed: tap to expand ──
                card.innerHTML = `
                    <div class="sce-collapsed">
                        <div class="sce-col-main">
                            <div class="sce-col-dept">${dept}</div>
                            <div class="sce-col-meta">
                                <span class="sce-col-amt">${CURRENCY} ${amt||'0'}</span>
                                <span class="sce-pay">${pay}</span>
                            </div>
                        </div>
                        <span class="sce-chevron">›</span>
                    </div>`;

                // tap anywhere on collapsed card = expand it
                card.addEventListener('click', () => {
                    mobileExpandedIdx = idx;
                    renderMobileSalesCards();
                });
            }

            cardList.appendChild(card);
        });
    }

    const fabBackdrop = document.getElementById('fab-backdrop');
    function closeFab() {
        fabOpen = false;
        fabActions.style.display = 'none';
        fabIcon.className = 'fas fa-ellipsis-h';
        if (fabBackdrop) fabBackdrop.classList.remove('active');
    }
    if (fabMainBtn) {
        fabMainBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fabOpen = !fabOpen;
            fabActions.style.display = fabOpen ? 'flex' : 'none';

            if (fabBackdrop) fabBackdrop.classList.toggle('active', fabOpen);

    if (document.getElementById('fab-preview')) {

            preview: () => { document.getElementById('preview-report').click(); closeFab(); },

    // ── Autocomplete on welcome screen ───────────────────────────────
    function initAutocomplete() {
        const nameInput = document.getElementById('welcome-manager-input');
        const acDiv = document.getElementById('welcome-autocomplete');
        if (!nameInput || !acDiv) return;

        function getAllKnownNames() {
            const names = new Set();
            // Primary: directly remembered names from this device
            try {
                const known = JSON.parse(localStorage.getItem('linde_known_names') || '[]');
                known.forEach(n => names.add(n));
            } catch(e) {}
            // Fallback: names from vault reports
            Object.keys(localStorage).filter(k => k.startsWith('linde_vault_')).forEach(k => {
                try {
                    const reports = JSON.parse(localStorage.getItem(k)) || [];
                    reports.forEach(r => { if (r.managerName) names.add(r.managerName.replace(/\w/g, c=>c.toUpperCase())); });
                } catch(e) {}
            });
            // Always include last user
            const lastUser = localStorage.getItem('linde_last_user');
            if (lastUser) names.add(lastUser.replace(/\w/g, c=>c.toUpperCase()));
            return [...names];
        }

        nameInput.addEventListener('input', function() {
            const val = this.value.trim();
            if (!val) { acDiv.style.display='none'; return; }
            const allNames = getAllKnownNames();
            const matches = allNames.filter(n => n.toLowerCase().startsWith(val.toLowerCase()));
            if (!matches.length) { acDiv.style.display='none'; return; }
            acDiv.innerHTML = matches.slice(0,5).map(m => `<div class="wac-item">${m}</div>`).join('');
            acDiv.style.display = 'block';
            acDiv.querySelectorAll('.wac-item').forEach(item => {
                item.addEventListener('click', () => {
                    nameInput.value = item.textContent;
                    acDiv.style.display = 'none';
                });
            });
        });

        // Show all known names on focus if field is empty
        nameInput.addEventListener('focus', function() {
            if (this.value.trim()) return;
            const allNames = getAllKnownNames();
            if (!allNames.length) return;
            acDiv.innerHTML = allNames.slice(0,5).map(m => `<div class="wac-item">${m}</div>`).join('');
            acDiv.style.display = 'block';
            acDiv.querySelectorAll('.wac-item').forEach(item => {
                item.addEventListener('click', () => {
                    nameInput.value = item.textContent;
                    acDiv.style.display = 'none';
                });
            });
        });

        document.addEventListener('click', e => { if (!acDiv.contains(e.target) && e.target !== nameInput) acDiv.style.display='none'; });
    }
    initAutocomplete();

    // ── Vault linked to Supabase ──────────────────────────────────────
    // Patch renderVaultList to load from Supabase first
    const _origRenderVaultList = renderVaultList;
    async function renderVaultListWithSupabase() {
        // Show local data immediately — no spinner, no wait
        _origRenderVaultList();
        // Then sync from Supabase silently in background
        try {
            const remote = await dbGetUserReports(currentUser);
            if (remote && remote.length) {
                const local = getUserVaultLocal();
                const merged = [...local];
                let changed = false;
                remote.forEach(r => {
                    if (!merged.find(l => String(l.id) === String(r.id))) {
                        merged.push(r);
                        changed = true;
                    }
                });
                if (changed) {
                    saveUserVault(merged);
                    // Refresh list silently only if vault is still open
                    if (document.getElementById('vault-modal').classList.contains('open')) {
                        _origRenderVaultList();
                    }
                }
            }
        } catch(e) { console.warn('Background Supabase vault sync failed:', e); }
    }

    function renderAdminReportCards() {
        const sorted = getFilteredReports(_cachedAllReports).slice().sort((a,b)=>new Date(b.reportDate||b.savedAt)-new Date(a.reportDate||a.savedAt));
        const listEl = document.getElementById('admin-reports-list');
        if (!listEl) return;
        if (!sorted.length) { listEl.innerHTML='<div class="vault-empty"><i class="fas fa-inbox"></i> No reports found.</div>'; return; }
        listEl.innerHTML = sorted.map((r,idx) => {
            const rTotal = (r.salesEntries||[]).reduce((s,e)=>s+(parseFloat((e.amount||'').replace(/[^\d.]/g,''))||0),0);
            const issues = Object.values(r.deptStatus||{}).filter(v=>v==='Issues').length;
            const metaIssue = issues ? `<span class="arc-issue">${issues} issue${issues>1?'s':''}</span>` : 'OK';
            return `<div class="admin-report-card" data-idx="${idx}">
                <div class="arc-head">
                    <div class="arc-left">
                        <div class="arc-name">${r.managerName||r.user||'Unknown'}</div>
                        <div class="arc-date">${formatReportDate(r.reportDate)}</div>
                    </div>
                    <div class="arc-right">
                        <div class="arc-rev">MWK ${fmt(rTotal)}</div>
                        <div class="arc-meta">R:${r.roomsSold||0} · G:${r.guestInHouse||0} · C:${r.complimentaryRooms||0} · ${metaIssue}</div>
                    </div>
                </div>
                <div class="arc-actions" style="display:none;">
                    <button class="arc-btn arc-btn-p" data-idx="${idx}"><i class="fas fa-search" style="font-size:9px;"></i> Preview</button>
                    <button class="arc-btn arc-btn-f" data-idx="${idx}"><i class="fas fa-file-pdf" style="font-size:9px;"></i> PDF</button>
                    <button class="arc-btn arc-btn-d" data-id="${r.id}" data-idx="${idx}"><i class="fas fa-trash" style="font-size:9px;"></i> Delete</button>
                </div>
            </div>`;
        }).join('');

        // Toggle expand on card click
        listEl.querySelectorAll('.admin-report-card').forEach(card => {
            card.querySelector('.arc-head').addEventListener('click', () => {
                const actions = card.querySelector('.arc-actions');
                const isOpen = actions.style.display !== 'none';
                // Close all
                listEl.querySelectorAll('.arc-actions').forEach(a => a.style.display='none');
                actions.style.display = isOpen ? 'none' : 'flex';
            });
        });

        // Wire buttons
        listEl.querySelectorAll('.arc-btn-p').forEach(btn => btn.addEventListener('click', async function(e) {
            e.stopPropagation();
            const snap = sorted[parseInt(this.dataset.idx)];
            if (!snap) return;
            previewContent.innerHTML = generatePreviewFromSnap(snap);
            previewModal.style.display = 'flex';
        }));
        listEl.querySelectorAll('.arc-btn-f').forEach(btn => btn.addEventListener('click', async function(e) {
            e.stopPropagation();
            const snap = sorted[parseInt(this.dataset.idx)];
            if (!snap) return;
            const cur = getFormSnapshot(); applySnapshot(snap);
            await generatePDFOnly(null, `Linde_Report_${snap.reportDate||'report'}.pdf`);
            applySnapshot(cur);
        }));
        listEl.querySelectorAll('.arc-btn-d').forEach(btn => btn.addEventListener('click', async function(e) {
            e.stopPropagation();
            if (!confirm('Permanently delete this report?')) return;
            await dbDeleteReport(this.dataset.id);
            await renderAdminDashboard();
        }));
    }
